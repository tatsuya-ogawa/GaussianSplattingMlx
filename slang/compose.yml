services:
  slang:
    build:
      context: ..
      dockerfile: slang/Dockerfile
    working_dir: /work
    volumes:
      - ..:/work
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >
        set -euo pipefail;
        mkdir -p build/slang_screen_space;
        for entry in gaussian_screen_color_forward gaussian_screen_color_backward gaussian_screen_cov2d_forward gaussian_screen_cov2d_backward gaussian_screen_inverse2d_forward gaussian_screen_inverse2d_backward; do
          slangc slang/gaussian_screen_space_kernels.slang -target metal -entry "$${entry}" -stage compute -o "build/slang_screen_space/$${entry}.metal";
        done;
        slangc -version;
        ls -1 build/slang_screen_space/*.metal
