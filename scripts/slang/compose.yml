services:
  slang:
    build:
      context: ../..
      dockerfile: scripts/slang/Dockerfile
    working_dir: /work
    volumes:
      - ../..:/work
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >
        set -euo pipefail;
        echo "--- Building Active Slang Kernels ---";
        bash scripts/slang/build_screen_space_slang_mlx.sh;
        bash scripts/slang/build_projection_slang_mlx.sh;
        bash scripts/slang/build_tile_global_slang_mlx.sh;
        bash scripts/slang/build_ssim_slang_mlx.sh;
        echo "--- Active JSON Summary ---";
        ls -1 GaussianSplattingMlx/Slang/*_mlx.json | sed 's#.*/##' | sort
